# git action workflow name
name: cd-main
# executing name: actor name
run-name: "CD actor : ${{github.actor}}"
# Controls when the workflow will run
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  front:
    permissions: 
      id-token: write
      contents: read
      
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        name: node install
        with:
          node-version: 24
      - name: install npm
        run: npm ci

      - name: npm test
        run: |
            npm test -- --watchAll=false --passWithNoTests
      - name: npm build
        env:
          CI: false
          REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.ARN_ROLE}}
          aws-region: ${{ vars.AWS_REGION }}

      - name: check aws identity
        run: aws sts get-caller-identity
      - name: Upload to S3 BUCKET
        if: github.ref == 'refs/heads/main' 
        run: aws s3 sync build/ s3://${{ secrets.AWS_BUCKET }} --delete --exclude "backend-deploy/*"
        
  server:
    permissions: 
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env: 
      DB_USER: ${{ secrets.DB_USER }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_URL: ${{ secrets.DB_URL }}
      JWT_TOKEN: ${{secrets.JWT_TOKEN}}
      GMAIL_PASSWORD: ${{secrets.GMAIL_PASSWORD}}
      SOL_API_KEY: ${{secrets.SOL_API_KEY}}
      SOL_API_SECRET: ${{secrets.SOL_API_SECRET}}
      SOL_SENDER_NUMBER: ${{secrets.SOL_SENDER_NUMBER}}
      TOSS_CLIENT_KEY: ${{secrets.TOSS_CLIENT_KEY}}
      TOSS_SECRET_KEY: ${{secrets.TOSS_SECRET_KEY}}

    steps:
      - uses: actions/checkout@v4
      - name: set up jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: add permission to execute
        run: chmod +x gradlew 

      - name: server test
        run: ./gradlew test jacocoTestReport
      - name: server build
        run: ./gradlew build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.ARN_ROLE}}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2 

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: caps-asap-server
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Upload deploy.sh to S3
        run: |
          aws s3 cp deploy.sh s3://${{ secrets.AWS_BUCKET }}/backend-deploy/deploy/deploy.sh
      
      - name: Upload JaCoCo report to S3
        run: |
          aws s3 sync build/reports/jacoco/test/html/ \
          s3://${{ secrets.AWS_BUCKET }}/backend-deploy/jacoco/${{ github.sha }}/
      
      - name: Start EC2 and Wait
        run: |
          aws ec2 start-instances --instance-ids ${{ vars.EC2_ID_INSTANCE }}
          aws ec2 wait instance-running --instance-ids ${{ vars.EC2_ID_INSTANCE }}

      - name: Wait for SSM ready
        run: |
          echo "Waiting for SSM Agent to be online..."
          i=0
          while true; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ vars.EC2_ID_INSTANCE }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text)
            
            if [ "$STATUS" = "Online" ]; then
              echo "SSM Agent is Online!"
              break
            fi

            if [ "$i" -ge 24 ]; then # 5초 * 36 = 180초
              echo "SSM Agent did not become online in time."
              exit 1
            fi
            
            echo "Current status: $STATUS. Waiting 5s... ($i)"
            i=$((i+1))
            sleep 5
          done

      - name: Run deploy on EC2
        env:
          ECR_IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
          --instance-ids ${{vars.EC2_ID_INSTANCE}} \
          --document-name "AWS-RunShellScript" \
          --timeout-seconds 900 \
          --parameters '{
            "commands": [
              "export HOME=/home/ubuntu",
              "mkdir -p /home/ubuntu/app",
              "cd /home/ubuntu/app",

              "aws s3 cp s3://${{ secrets.AWS_BUCKET }}/backend-deploy/deploy/deploy.sh .",

              "cat > /home/ubuntu/app/.env << '"'"'EOF'"'"'",
              "DB_URL=${{secrets.DB_URL}}",
              "DB_NAME=${{secrets.DB_NAME}}",
              "DB_USER=${{secrets.DB_USER}}",
              "DB_PASSWORD=${{secrets.DB_PASSWORD}}",
              "JWT_TOKEN=${{secrets.JWT_TOKEN}}",
              "GMAIL_PASSWORD=${{secrets.GMAIL_PASSWORD}}",
              "SOL_API_KEY=${{secrets.SOL_API_KEY}}",
              "SOL_API_SECRET=${{secrets.SOL_API_SECRET}}",
              "SOL_SENDER_NUMBER=${{secrets.SOL_SENDER_NUMBER}}",
              "AWS_REGION=${{ vars.AWS_REGION }}",
              "AWS_BUCKET=${{secrets.AWS_BUCKET}}",
              "AWS_CLOUD_FRONT=${{vars.AWS_CLOUD_FRONT}}",
              "AWS_ACCESS_KEY_ID=${{secrets.AWS_ACCESS_KEY_ID}}",
              "AWS_SECRET_ACCESS_KEY=${{secrets.AWS_SECRET_ACCESS_KEY}}",
              "TOSS_CLIENT_KEY=${{secrets.TOSS_CLIENT_KEY}}",
              "TOSS_SECRET_KEY=${{secrets.TOSS_SECRET_KEY}}",
              "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}",
              "CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}",
              "EOF",

              "chmod 600 .env",
              "chmod +x deploy.sh",
              "bash deploy.sh ${{steps.build-image.outputs.image}}"
            ]
          }' \
          --query "Command.CommandId" \
          --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "배포 완료 대기 중 (최대 15분)..."
          MAX_ATTEMPTS=90
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id ${{vars.EC2_ID_INSTANCE}} \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/$MAX_ATTEMPTS] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "배포 성공!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "배포 실패 (Status: $STATUS)"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{vars.EC2_ID_INSTANCE}} \
                --query "StandardOutputContent" \
                --output text
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{vars.EC2_ID_INSTANCE}} \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "배포 타임아웃 ($((MAX_ATTEMPTS * 10))초 초과)"
          exit 1

  