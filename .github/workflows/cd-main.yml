# git action workflow name
name: cd-main
# executing name: actor name
run-name: "CD actor : ${{github.actor}}"
# Controls when the workflow will run
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  front:
    permissions: 
      id-token: write
      contents: read
      
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        name: node install
        with:
          node-version: 24
      - name: install npm
        run: npm ci

      - name: npm test
        run: |
            npm test -- --watchAll=false --passWithNoTests
      - name: npm build
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.EC2_URL_TEST }}
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.ARN_ROLE}}
          aws-region: ${{ vars.AWS_REGION }}

      - name: check aws identity
        run: aws sts get-caller-identity
      - name: Upload to S3 BUCKET
        if: github.ref == 'refs/heads/main' 
        run: aws s3 sync build/ s3://caps-asap-bucket --delete --exclude "backend-deploy/*"
        
  server:
    permissions: 
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      redis:
        image: redis
        ports: 
          - 6379:6379
    env: 
      DB_USER: ${{ secrets.DB_USER }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_URL: ${{ secrets.DB_URL }}
      JWT_TOKEN: ${{secrets.JWT_TOKEN}}
      GMAIL_PASSWORD: ${{secrets.GMAIL_PASSWORD}}
      SOL_API_KEY: ${{secrets.SOL_API_KEY}}
      SOL_API_SECRET: ${{secrets.SOL_API_SECRET}}
      SOL_SENDER_NUMBER: ${{secrets.SOL_SENDER_NUMBER}}
    steps:
      - uses: actions/checkout@v4
      - name: set up jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: add permission to execute
        run: chmod +x gradlew 

      - name: server build
        run: ./gradlew build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.ARN_ROLE}}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload to S3
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -n 1)
          aws s3 cp $JAR_FILE s3://caps-asap-bucket/backend-deploy/deploy/app.jar

      - name: Start EC2 and Wait
        run: |
          aws ec2 start-instances --instance-ids ${{ vars.EC2_ID_INSTANCE_TEST }}
          aws ec2 wait instance-running --instance-ids ${{ vars.EC2_ID_INSTANCE_TEST }}

      - name: Wait for SSM ready
        run: |
          echo "Waiting for SSM Agent to be online..."
          i=0
          while true; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ vars.EC2_ID_INSTANCE_TEST }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text)
            
            if [ "$STATUS" = "Online" ]; then
              echo "SSM Agent is Online!"
              break
            fi

            if [ "$i" -ge 24 ]; then # 5초 * 24 = 120초
              echo "SSM Agent did not become online in time."
              exit 1
            fi
            
            echo "Current status: $STATUS. Waiting 5s... ($i)"
            i=$((i+1))
            sleep 5
          done

      - name: Run command and wait
        run: |
          COMMAND_ID=$(aws ssm send-command \
          --instance-ids ${{vars.EC2_ID_INSTANCE_TEST}} \
          --document-name "AWS-RunShellScript" \
          --parameters '{
            "commands": [
              "export HOME=/home/ubuntu",
              "mkdir -p /home/ubuntu/app",
              "cd /home/ubuntu/app",

              "sudo fuser -k 8080/tcp || true",
              
              "aws s3 cp s3://caps-asap-bucket/backend-deploy/deploy/app.jar .",
              
              "export DB_URL=${{secrets.DB_URL}}",
              "export DB_NAME=${{secrets.DB_NAME}}",
              "export DB_USER=${{secrets.DB_USER}}",
              "export DB_PASSWORD=${{secrets.DB_PASSWORD}}",
              "export JWT_TOKEN=${{secrets.JWT_TOKEN}}",
              "export GMAIL_PASSWORD=${{secrets.GMAIL_PASSWORD}}",
              "export SOL_API_KEY=${{secrets.SOL_API_KEY}}",
              "export SOL_API_SECRET=${{secrets.SOL_API_SECRET}}",
              "export SOL_SENDER_NUMBER=${{secrets.SOL_SENDER_NUMBER}}",
              "nohup java -jar app.jar > /home/ubuntu/app/server.log 2>&1 < /dev/null &",
              
              "echo deploy_success > /home/ubuntu/app/test.txt"
            ]
          }' \
          --query "Command.CommandId" \
          --output text)

          aws ssm wait command-executed \
          --command-id $COMMAND_ID \
          --instance-id ${{vars.EC2_ID_INSTANCE_TEST}}

      # - name: Stop EC2
      #  if: always()
      #   run: |
      #     aws ec2 stop-instances \
      #     --instance-ids ${{vars.EC2_ID_INSTANCE_TEST}}
  