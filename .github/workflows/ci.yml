# git action workflow name
name: ci
# executing name, can use environment variables
run-name: "actor : ${{github.actor}}"
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ main, "dev/server", "dev/front","develop" ]
      # 실행할 경로를 아래 경로 파일들의 변동으로 제한
    paths:
      - 'front/**'
      - 'server/**'
      - '.github/workflows/*'
  pull_request:
    branches: [ "main", "develop"]
    paths:
      - 'front/**'
      - 'server/**'
      - '.github/workflows/*'

  # Allows you to run this workflow manually from the Actions tab
  #workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  filter:
    runs-on: ubuntu-latest
    outputs: 
      server_change:  ${{steps.filter.outputs.server}}
      front_change: ${{steps.filter.outputs.front}}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            front:
              -  'front/**'
              -  '.github/workflows/*'
            server:
              - 'server/**'
              - '.github/workflows/*'

  # This workflow contains a single job called "build"
  front:
    needs: filter
    if: needs.filter.outputs.front_change == 'true'
    permissions: 
      id-token: write
      contents: read
      
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # default setting
    defaults:
      run:
        working-directory: front
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        name: node install
        with:
          node-version: 18
      - name: install npm
        run: npm ci

      - name: npm test
        run: |
          npm test -- --watchAll=false --passWithNoTests

      - name: npm build
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.ARN_ROLE}}
          aws-region: ${{ vars.AWS_REGION }}

      - name: check aws identity
        run: aws sts get-caller-identity
      - name: Upload to S3BUCKET
        if: github.ref == 'refs/heads/main'
        run: aws s3 sync build/ s3://caps-asap-bucket --delete
      - name: Upload to S3BUCKET for Test
        if: github.ref != 'refs/heads/main'
        run: aws s3 sync build/ s3://caps-asap-bucket-test --delete
        


  server:
    needs: filter
    if: needs.filter.outputs.server_change == 'true'
    permissions: 
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: add permission to execute
        run: chmod +x gradlew 
      - name: server build
        run: ./gradlew build
      - name: server test
        run: ./gradlew test
      - name: EC2 server executing
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.ARN_ROLE}}
          aws-region: ${{ vars.AWS_REGION }}
      - name: check aws identity
        run: aws sts get-caller-identity
      - name: Start EC2
        run: |
          aws ec2 start-instances \
          --instance-ids ${{ vars.EC2_ID_INSTANCE }}

      - name: Wait for EC2 running
        run: |
          aws ec2 wait instance-running \
          --instance-ids ${{vars.EC2_ID_INSTANCE}}
      - name: Wait for SSM ready
        run: |
          echo "Waiting for SSM Agent to be online..."
          while true; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ vars.EC2_ID_INSTANCE }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text)
            
            if [ "$STATUS" = "Online" ]; then
              echo "SSM Agent is Online!"
              break
            fi
            
            echo "Current status: $STATUS. Waiting 5 seconds..."
            sleep 5
          done
      - name: Run command and wait
        run: |
          COMMAND_ID=$(aws ssm send-command \
          --instance-ids ${{vars.EC2_ID_INSTANCE}} \
          --document-name "AWS-RunShellScript" \
          --parameters '{
            "commands": [
              "mkdir -p /home/ubuntu/app",
              "echo deploy_test_success > /home/ubuntu/app/test.txt"
            ]
          }' \
          --query "Command.CommandId" \
          --output text)

          aws ssm wait command-executed \
          --command-id $COMMAND_ID \
          --instance-id ${{vars.EC2_ID_INSTANCE}}

      - name: Stop EC2
        if: always()
        run: |
          aws ec2 stop-instances \
          --instance-ids ${{vars.EC2_ID_INSTANCE}}
  