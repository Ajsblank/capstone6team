# git action workflow name
name: ci-test
# executing name, can use environment variables
run-name: "actor : ${{github.actor}}"
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ develop, "dev/server", "dev/front","develop","feat/**","dev/**"]
      # 실행할 경로를 아래 경로 파일들의 변동으로 제한
    paths:
      - 'front/**'
      - 'server/**'
      - '.github/workflows/*'
  pull_request:
    branches: [ develop, "dev/server","dev/front"]
    paths:
      - 'front/**'
      - 'server/**'
      - '.github/workflows/*'

  # Allows you to run this workflow manually from the Actions tab
  #workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  filter:
    runs-on: ubuntu-latest
    outputs: 
      server_change:  ${{steps.filter_server.outputs.server || 'false'}}
      front_change: ${{steps.filter_front.outputs.front || 'false'}}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        name: check if front directory exits
        id: filter_front
        if: hashFiles('front/**') !=  ''
        with:
          filters: |
            front:
              -  'front/**'
              -  '.github/workflows/*'
      - uses: dorny/paths-filter@v4
        name: check if server directory exits
        if: hashFiles('server/**') !=  ''
        id: filter_server
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/*'

  # This workflow contains a single job called "build"
  front:
    needs: filter
    if: needs.filter.outputs.front_change == 'true'
    permissions: 
      id-token: write
      contents: read
      
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # default setting
    defaults:
      run:
        working-directory: front
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        name: node install
        with:
          node-version: 24
      - name: install npm
        run: npm ci

      - name: npm test
        run: |
            npm test -- --watchAll=false --passWithNoTests
      - name: npm build
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.EC2_URL }}
        run: npm run build


      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.ARN_ROLE}}
          aws-region: ${{ vars.AWS_REGION }}

      - name: check aws identity
        run: aws sts get-caller-identity
      - name: Upload to S3 TEST BUCKET
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' 
        run: aws s3 sync build/ s3://caps-asap-bucket-test --delete
        


  server:
    needs: filter
    if: needs.filter.outputs.server_change == 'true'
    permissions: 
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env: 
      DB_USER: ${{ secrets.DB_USER }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_URL: ${{ secrets.DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: add permission to execute
        run: chmod +x gradlew 
      - name: server build
        run: ./gradlew build -x test
      - name: EC2 server executing
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.ARN_ROLE}}
          aws-region: ${{ vars.AWS_REGION }}
      - run: aws sts get-caller-identity
      - name: Start EC2
        run: |
          aws ec2 start-instances \
          --instance-ids ${{ vars.EC2_ID_INSTANCE }}

      - name: Wait for EC2 running
        run: |
          aws ec2 wait instance-running \
          --instance-ids ${{vars.EC2_ID_INSTANCE}}
      - name: Wait for SSM ready
        run: |
          echo "Waiting for SSM Agent to be online..."
          for i in {1..120}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ vars.EC2_ID_INSTANCE }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text)
            
            if [ "$STATUS" = "Online" ]; then
              echo "SSM Agent is Online!"
              break
            fi

            if [ "$i" -eq 120 ]; then
              echo "SSM Agent did not become online in time."
              exit 1
            fi
            
            echo "Current status: $STATUS. Waiting 5 seconds..."
            sleep 5
          done
      - name: Run command and wait
        run: |
          COMMAND_ID=$(aws ssm send-command \
          --instance-ids ${{vars.EC2_ID_INSTANCE}} \
          --document-name "AWS-RunShellScript" \
          --timeout-seconds 3600 \
          --parameters '{
            "commands": [
              "export HOME=/home/ubuntu",
              "APP_DIR=/home/ubuntu/capstone6team",
              "mkdir -p $APP_DIR",
              "cd $APP_DIR",

              "if [ ! -d .git ]; then git clone https://github.com/${{ github.repository }}.git .; fi",
              "git fetch origin ${{ github.head_ref || github.ref_name }}",
              "git reset --hard origin/${{ github.head_ref || github.ref_name }}",

              
              "fuser -k 8080/tcp || true",
              
              "cd server && chmod +x gradlew",
              "./gradlew clean build -x test || exit 1",

              "JAR_NAME=$(find build/libs -name \"*.jar\" ! -name \"*plain*\" | head -n 1)",
              "if [ -z \"$JAR_NAME\" ]; then echo \"JAR not found after build\"; exit 1; fi",
              "nohup java -DDB_URL=${{secrets.DB_URL}} -DDB_NAME=${{secrets.DB_NAME}} -DDB_USER=${{secrets.DB_USER}} -DDB_PASSWORD=${{secrets.DB_PASSWORD}} -jar $JAR_NAME > $APP_DIR/server.log 2>&1 &",
              
              "echo \"Waiting for server to start...\"",
              "sleep 15",
              "if ! pgrep -f $JAR_NAME > /dev/null; then echo \"Server failed to start\"; cat $APP_DIR/server.log; exit 1; fi",
             
              "echo deploy_success > $APP_DIR/test.txt"
            ]
          }' \
          --query "Command.CommandId" \
          --output text)

          echo "SSM Command ID: $COMMAND_ID"
          FINAL_STATUS=""
          for i in {1..180}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)

            echo "SSM status[$i/180]: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              FINAL_STATUS="$STATUS"
              break
            fi

            if [[ "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" || "$STATUS" == "Cancelling" ]]; then
              echo "SSM command finished with failure state."
              aws ssm list-command-invocations \
                --command-id "$COMMAND_ID" \
                --details \
                --query 'CommandInvocations[0].{Status:Status,StatusDetails:StatusDetails,ResponseCode:CommandPlugins[0].ResponseCode,Output:CommandPlugins[0].Output,StdErr:CommandPlugins[0].StandardErrorContent}' \
                --output json
              exit 1
            fi

            sleep 10
          done

          if [[ "$FINAL_STATUS" != "Success" ]]; then
            echo "SSM command did not complete within the polling window."
            aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --query 'CommandInvocations[0].{Status:Status,StatusDetails:StatusDetails,ResponseCode:CommandPlugins[0].ResponseCode,Output:CommandPlugins[0].Output,StdErr:CommandPlugins[0].StandardErrorContent}' \
              --output json
            exit 1
          fi

      # - name: Stop EC2
      #  if: always()
      #   run: |
      #     aws ec2 stop-instances \
      #     --instance-ids ${{vars.EC2_ID_INSTANCE}}
  