# PostgreSQL DB
spring.datasource.url=jdbc:postgresql://${DB_URL}:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 응답 생성 시 DB 닫기 설정 (참고)
# spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# 추후 비밀번호 설정 필요
# spring.data.redis.password=${REDIS_PASSWORD}

# Swagger UI 접속 경로 설정 (기본값은 /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
# API 문서를 읽어올 경로
springdoc.api-docs.path=/v3/api-docs

# 서버 오류를 에러 하지 않음
spring.web.error.include-stacktrace=never
# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://caps-asap-bucket-test.s3-website-us-east-1.amazonaws.com,http://caps-asap-bucket.s3-website-us-east-1.amazonaws.com

server.port=8080
server.address=0.0.0.0

# JWT
jwt.secret=${JWT_TOKEN}
jwt.expiration=3600000

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=ajs8780@ajou.ac.kr
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.starttls.enable=true

# 465 포트를 위한 필수 설정
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# 465 사용 시 starttls는 false로 두거나 삭제해도 됩니다.
spring.mail.properties.mail.smtp.starttls.enable=false

# Solapi SMS 발송을 위한 변수
solapi.api-key=${SOL_API_KEY}
solapi.api-secret=${SOL_API_SECRET}
solapi.from-number=${SOL_SENDER_NUMBER}


# 리전
cloud.aws.region=${AWS_REGION}

# S3 버킷 설정
cloud.aws.s3.bucket=${AWS_BUCKET_TEST}
cloud.aws.s3.presigned-expiry-minutes=60
cloud.aws.s3.public-base-url=http://${AWS_BUCKET_TEST}.s3-website-${AWS_REGION}.amazonaws.com
cloud.aws.s3.contest-html-prefix=backend-deploy/contest-resource
cloud.aws.s3.contest-code-prefix=backend-deploy/contest-resource

# 로컬 테스트용 IAM credentials (미설정 시 IAM Role / EC2 인스턴스 메타데이터 사용)
# 환경변수 AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY 로도 설정 가능
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}

# # flyway DB 관리 도구 사용 (비활성화)
spring.flyway.enabled=false
# # Flyway 활성화
# spring.flyway.enabled=true 
# # Flyway가 제공하는 변경 이력 테이블 자동 생성
# spring.flyway.baseline-on-migrate=true 
# # 초기 버전 설정
# spring.flyway.baseline-version=1
# # 변경 이력 경로 
# spring.flyway.locations=classpath:db/migration

# 전체 DEBUG: 디버그 메시지 표시
