# PostgreSQL DB
spring.datasource.url=jdbc:postgresql://${DB_URL}:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Swagger UI 접속 경로 설정 (기본값은 /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
# API 문서를 읽어올 경로
springdoc.api-docs.path=/v3/api-docs

# 서버 오류를 에러 하지 않음
spring.web.error.include-stacktrace=never
# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

server.port=8080
server.address=0.0.0.0

# JWT
jwt.secret=${JWT_TOKEN}
jwt.expiration=3600000

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=ajs8780@ajou.ac.kr
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.starttls.enable=true

# 465 포트를 위한 필수 설정
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# 465 사용 시 starttls는 false로 두거나 삭제해도 됩니다.
spring.mail.properties.mail.smtp.starttls.enable=false

