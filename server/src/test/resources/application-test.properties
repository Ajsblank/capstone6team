spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2-test.sql

jwt.secret=01234567890123456789012345678901
jwt.expiration=3600000

cors.allowed-origins=http://localhost:3000

cloud.aws.region=us-east-1
cloud.aws.s3.bucket=test-bucket
cloud.aws.s3.presigned-expiry-minutes=60
cloud.aws.s3.public-base-url=http://localhost:4566/test-bucket
cloud.aws.s3.contest-html-prefix=test/contest-resource
cloud.aws.s3.contest-code-prefix=test/contest-resource
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key

solapi.api-key=test-solapi-key
solapi.api-secret=test-solapi-secret
solapi.from-number=01000000000
