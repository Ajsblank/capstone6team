spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2-test.sql
spring.flyway.enabled=false

jwt.secret=01234567890123456789012345678901
jwt.expiration=3600000

cors.allowed-origins=http://localhost:3000

# CI/test context startup safety: avoid unresolved cloud.aws placeholders
cloud.aws.region=${TEST_AWS_REGION:ap-northeast-2}
cloud.aws.s3.bucket=${TEST_AWS_BUCKET:dummy-test-bucket}
cloud.aws.s3.presigned-expiry-minutes=60
cloud.aws.s3.public-base-url=http://${cloud.aws.s3.bucket}.s3-website-${cloud.aws.region}.amazonaws.com
cloud.aws.s3.contest-html-prefix=backend-deploy/contest-resource
cloud.aws.s3.contest-code-prefix=backend-deploy/contest-resource
cloud.aws.credentials.access-key=
cloud.aws.credentials.secret-key=
