spring.datasource.url=jdbc:postgresql://${DB_URL_STAGING}:5432/${DB_NAME_STAGING}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=false

jwt.secret=${JWT_TOKEN}
jwt.expiration=3600000

cors.allowed-origins=http://localhost:3000

# AWS S3
cloud.aws.region=${AWS_REGION}
cloud.aws.s3.bucket=${AWS_BUCKET_TEST}
cloud.aws.s3.presigned-expiry-minutes=60
cloud.aws.s3.public-base-url=http://${cloud.aws.s3.bucket}.s3-website-${cloud.aws.region}.amazonaws.com
cloud.aws.s3.contest-html-prefix=backend-deploy/contest-resource
cloud.aws.s3.contest-code-prefix=backend-deploy/contest-resource
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Redis
spring.data.redis.host=${REDIS_HOST:3.216.165.85}
spring.data.redis.port=${REDIS_PORT:6379}

# ================================
# TEST-ONLY: 외부 서비스 연결 설정
# ================================

# Solapi SMS
solapi.api-key=${SOL_API_KEY}
solapi.api-secret=${SOL_API_SECRET}
solapi.from-number=${SOL_SENDER_NUMBER}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=ajs8780@ajou.ac.kr
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=false
