<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>버섯사과 — 번갈아 플레이</title>
  <style>
    @font-face {
      font-family: 'Maplestory';
      font-weight: 700;
      src: url('assets/fonts/Maplestory-Bold.woff2') format('woff2'),
           url('assets/fonts/Maplestory-Bold.woff') format('woff');
    }
    @font-face {
      font-family: 'Maplestory';
      font-weight: 400;
      src: url('assets/fonts/Maplestory-Light.woff2') format('woff2'),
           url('assets/fonts/Maplestory-Light.woff') format('woff');
    }
    @font-face {
      font-family: 'Pretendard';
      font-weight: 400;
      src: url('assets/Pretendard-Regular.subset-BZqc2FCe.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Pretendard';
      font-weight: 500;
      src: url('assets/Pretendard-Medium.subset-D07TkZcI.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Pretendard';
      font-weight: 700;
      src: url('assets/Pretendard-Bold.subset-NvQkMce4.woff2') format('woff2');
    }
    @font-face {
      font-family: 'IBMPlexMono';
      src: url('assets/ibm-plex-mono-latin-400-normal-Dm_PoFIZ.woff2') format('woff2');
      font-weight: 400;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
    }
    header h1 {
      font-family: 'Maplestory', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #87ceeb;
      letter-spacing: 0.04em;
    }

    /* ── Main layout ─────────────────────────────── */
    .main {
      display: flex;
      gap: 16px;
      padding: 20px 16px 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      align-items: flex-start;
    }

    /* ── Left: game area ─────────────────────────── */
    .game-col {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
    }

    /* ── Game row: [player-left] [board] [player-right] ── */
    .game-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* ── Player cards ────────────────────────────── */
    .player-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 20px 14px;
      background: #16213e;
      border-radius: 14px;
      border: 2px solid #2a2a4a;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      min-width: 130px;
    }
    .player-card[data-player="first"].active {
      border-color: #87ceeb;
      box-shadow: 0 0 18px 2px rgba(135,206,235,0.35);
    }
    .player-card[data-player="second"].active {
      border-color: #ce93d8;
      box-shadow: 0 0 18px 2px rgba(206,147,216,0.35);
    }
    .player-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .player-card[data-player="first"].active::before {
      background: linear-gradient(135deg, rgba(135,206,235,0.08), transparent);
      opacity: 1;
    }
    .player-card[data-player="second"].active::before {
      background: linear-gradient(135deg, rgba(206,147,216,0.08), transparent);
      opacity: 1;
    }

    .turn-badge {
      position: absolute;
      top: -11px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 99px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      white-space: nowrap;
    }
    .player-card[data-player="first"]  .turn-badge { background: #87ceeb; color: #000; }
    .player-card[data-player="second"] .turn-badge { background: #ce93d8; color: #000; }
    .player-card.active .turn-badge { opacity: 1; }

    .player-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'Maplestory', sans-serif;
    }
    .pa--first  { background: rgba(135,206,235,0.2); color: #87ceeb; border: 2px solid rgba(135,206,235,0.4); }
    .pa--second { background: rgba(206,147,216,0.2); color: #ce93d8; border: 2px solid rgba(206,147,216,0.4); }
    .player-name {
      font-family: 'Maplestory', sans-serif;
      font-size: 0.9rem;
    }
    .player-card[data-player="first"]  .player-name { color: #87ceeb; }
    .player-card[data-player="second"] .player-name { color: #ce93d8; }
    .player-score {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }
    .player-card[data-player="first"]  .player-score { color: #87ceeb; }
    .player-card[data-player="second"] .player-score { color: #ce93d8; }

    /* ── Board ───────────────────────────────────── */
    .board-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.45);
      display: inline-block;
      cursor: crosshair;
      touch-action: none;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(17, 40px);
      grid-template-rows: repeat(10, 40px);
      gap: 1px;
      background: #ccc;
      border: 1px solid #ccc;
    }
    .cell {
      width: 40px;
      height: 40px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      overflow: hidden;
    }
    .cell-icon {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.5;
      pointer-events: none;
    }
    .cell-num {
      position: relative;
      z-index: 1;
      font-size: 1rem;
      font-weight: 700;
      pointer-events: none;
      color: #444;
    }
    .cell.owned-first  { background: #b3e5fc; }
    .cell.owned-second { background: #e1bee7; }
    /* hint: only unoccupied cells */
    .cell.hint { background: #c8e6c9; }

    /* Selection states */
    .cell.sel { z-index: 2; outline-offset: -2px; }
    .cell.sel.s-low   { outline: 2px solid #ffc107; background: rgba(255,193,7,0.22) !important; }
    .cell.sel.s-over  { outline: 2px solid #f44336; background: rgba(244,67,54,0.22) !important; }
    .cell.sel.s-bbox  { outline: 2px solid #ff9800; background: rgba(255,152,0,0.22) !important; }
    .cell.sel.s-valid { outline: 2px solid #4caf50; background: rgba(76,175,80,0.30) !important; }

    /* ── Controls ────────────────────────────────── */
    .controls-area {
      width: 100%;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #16213e;
      border-radius: 10px;
      padding: 8px 12px;
    }

    button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'Pretendard', inherit;
      font-weight: 500;
      background: #0f3460;
      color: #ccc;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: #1a5276; color: #fff; }
    button:disabled { opacity: 0.38; cursor: not-allowed; }
    button.active-toggle { background: #5b2d8e; color: #e0e0e0; }

    /* ── Status bar ──────────────────────────────── */
    .status-bar {
      width: 100%;
      background: #111;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.82rem;
      color: #888;
      min-height: 2.2rem;
      display: flex;
      align-items: center;
      margin-top: 2px;
    }

    /* ── Result banner ───────────────────────────── */
    .result-banner {
      display: none;
      background: #16213e;
      border-radius: 12px;
      padding: 18px 20px;
      text-align: center;
      border: 1px solid #2a2a4a;
      margin-top: 8px;
      width: 100%;
    }
    .result-banner.show { display: block; }
    .result-title {
      font-family: 'Maplestory', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }
    .result-scores {
      display: flex;
      justify-content: center;
      gap: 28px;
      font-size: 1rem;
      font-weight: 600;
    }

    /* ── Log panel ───────────────────────────────── */
    .log-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .log-header {
      background: #16213e;
      border-radius: 10px 10px 0 0;
      padding: 8px 14px;
      font-family: 'Maplestory', sans-serif;
      font-size: 0.88rem;
      color: #87ceeb;
    }
    .log-box {
      background: #1e1e2e;
      border-radius: 0 0 10px 10px;
      overflow-y: auto;
      max-height: calc(100vh - 110px);
      font-family: 'IBMPlexMono', 'Consolas', monospace;
      font-size: 0.78rem;
    }
    .log-entry {
      display: flex;
      align-items: baseline;
    }
    .log-entry:hover { background: #252535; }
    .log-no {
      flex: 0 0 3.6em;
      text-align: right;
      padding: 3px 8px;
      color: #555;
    }
    .log-sep { color: #444; padding: 3px 0; }
    .log-text {
      flex: 1;
      padding: 3px 10px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #dedfe0;
    }

    @media (max-width: 1000px) {
      .main { flex-direction: column; }
      .log-box { max-height: 300px; }
    }
  </style>
</head>
<body>

<header>
  <h1>번갈아 플레이</h1>
</header>

<div class="main">

  <!-- Game area -->
  <div class="game-col">

    <!-- Player cards flanking the board -->
    <div class="game-row">

      <div class="player-card" id="card-first" data-player="first">
        <div class="turn-badge">내 차례</div>
        <div class="player-avatar pa--first">P1</div>
        <div class="player-name">선공</div>
        <div class="player-score" id="score-first">0</div>
      </div>

      <div class="board-wrap" id="boardWrap">
        <div class="board" id="board"></div>
      </div>

      <div class="player-card" id="card-second" data-player="second">
        <div class="turn-badge">내 차례</div>
        <div class="player-avatar pa--second">P2</div>
        <div class="player-name">후공</div>
        <div class="player-score" id="score-second">0</div>
      </div>

    </div>

    <!-- Controls -->
    <div class="controls-area">
      <div class="ctrl-row">
        <button id="btnHint">힌트 켜기</button>
        <button id="btnSkip">스킵</button>
        <button id="btnNew">새 게임</button>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar">
      <span style="color:#888">드래그하여 합이 10인 직사각형을 선택하세요</span>
    </div>

    <!-- Result banner -->
    <div class="result-banner" id="resultBanner">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-scores" id="resultScores"></div>
    </div>

  </div>

  <!-- Log panel -->
  <div class="log-col">
    <div class="log-header">게임 로그</div>
    <div class="log-box" id="logBox"></div>
  </div>

</div>

<script>
const ROWS = 10, COLS = 17;
const LOG_COLOR = {
  INIT: '#ffb74d', FIRST: '#64b5f6', SECOND: '#ba68c8',
  WIN: '#81c784', LOSE: '#81c784',
};

let board = null;
let currentPlayer = 'first';
let actionIndex = 0;
let consecutiveSkips = 0;
let finished = false;
let dragStart = null, dragEnd = null, isDragging = false;
let showHints = false, hintSet = null;

// ── Core logic ───────────────────────────────────────────
function randomBoard() {
  return Array.from({length: ROWS}, () =>
    Array.from({length: COLS}, () => (Math.random() * 9 | 0) + 1));
}

function buildPS(b) {
  const ps = Array.from({length: ROWS+1}, () => new Int32Array(COLS+1));
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      ps[r+1][c+1] = Math.max(0, b[r][c]) + ps[r][c+1] + ps[r+1][c] - ps[r][c];
  return ps;
}
function rectQ(ps, r1, c1, r2, c2) {
  return ps[r2+1][c2+1] - ps[r1][c2+1] - ps[r2+1][c1] + ps[r1][c1];
}

function checkSelection(r1, c1, r2, c2) {
  let sum = 0, minR = ROWS, maxR = -1, minC = COLS, maxC = -1;
  for (let r = r1; r <= r2; r++) for (let c = c1; c <= c2; c++) {
    const v = board[r][c];
    if (v > 0) {
      sum += v;
      if (r < minR) minR = r; if (r > maxR) maxR = r;
      if (c < minC) minC = c; if (c > maxC) maxC = c;
    }
  }
  if (sum !== 10) return { sum, valid: false, reason: sum < 10 ? 'low' : 'over' };
  if (minR !== r1 || maxR !== r2 || minC !== c1 || maxC !== c2)
    return { sum, valid: false, reason: 'bbox' };
  return { sum, valid: true, reason: 'valid' };
}

function anyRectSums10() {
  const ps = buildPS(board);
  for (let r1=0; r1<ROWS; r1++) for (let r2=r1; r2<ROWS; r2++)
    for (let c1=0; c1<COLS; c1++) for (let c2=c1; c2<COLS; c2++)
      if (rectQ(ps,r1,c1,r2,c2) === 10) return true;
  return false;
}

function computeHintSet() {
  const ps = buildPS(board);
  const result = new Set();
  for (let r1=0; r1<ROWS; r1++) for (let r2=r1; r2<ROWS; r2++)
    for (let c1=0; c1<COLS; c1++) for (let c2=c1; c2<COLS; c2++)
      if (rectQ(ps,r1,c1,r2,c2) === 10 && checkSelection(r1,c1,r2,c2).valid)
        for (let r=r1; r<=r2; r++) for (let c=c1; c<=c2; c++)
          if (board[r][c] > 0) result.add(r * COLS + c);
  return result;
}

function getScores() {
  let first = 0, second = 0;
  for (const row of board) for (const v of row)
    if (v === -1) first++; else if (v === -2) second++;
  return { first, second };
}

// ── Actions ──────────────────────────────────────────────
function doMove(r1, c1, r2, c2) {
  const tag = actionIndex % 2 === 0 ? 'FIRST' : 'SECOND';
  const val = currentPlayer === 'first' ? -1 : -2;
  for (let r=r1; r<=r2; r++) for (let c=c1; c<=c2; c++) board[r][c] = val;
  pushLog(`${tag} ${r1} ${c1} ${r2} ${c2} 0`);
  actionIndex++;
  consecutiveSkips = 0;
  hintSet = null;
  if (!anyRectSums10()) { endGame(); return; }
  currentPlayer = currentPlayer === 'first' ? 'second' : 'first';
}

function doSkip() {
  if (finished) return;
  const tag = actionIndex % 2 === 0 ? 'FIRST' : 'SECOND';
  pushLog(`${tag} -1 -1 -1 -1 0`);
  actionIndex++;
  consecutiveSkips++;
  hintSet = null;
  if (consecutiveSkips >= 2) { endGame(); return; }
  currentPlayer = currentPlayer === 'first' ? 'second' : 'first';
}

function endGame() {
  finished = true;
  const sc = getScores();
  let result;
  if (sc.first > sc.second)      result = 'WIN LOSE';
  else if (sc.second > sc.first) result = 'LOSE WIN';
  else                            result = 'WIN WIN';
  pushLog(result);
  showResult(sc);
}

function showResult(sc) {
  const banner = document.getElementById('resultBanner');
  const title  = document.getElementById('resultTitle');
  const scores = document.getElementById('resultScores');
  let winText, winColor;
  if (sc.first > sc.second)      { winText = '선공 승리!'; winColor = '#87ceeb'; }
  else if (sc.second > sc.first) { winText = '후공 승리!'; winColor = '#ce93d8'; }
  else                            { winText = '무승부!';   winColor = '#ffd54f'; }
  title.textContent = winText;
  title.style.color = winColor;
  scores.innerHTML =
    `<span style="color:#87ceeb">선공 ${sc.first}점</span>` +
    `<span style="color:#ce93d8">후공 ${sc.second}점</span>`;
  banner.classList.add('show');
}

// ── Board rendering ──────────────────────────────────────
function buildBoardDOM() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `c-${r}-${c}`;
      cell.dataset.r = r;
      cell.dataset.c = c;
      const num = document.createElement('span');
      num.className = 'cell-num';
      cell.appendChild(num);
      cell.addEventListener('mousedown',  onCellDown);
      cell.addEventListener('mouseenter', onCellEnter);
      el.appendChild(cell);
    }
  }
  document.addEventListener('mouseup', onDocMouseUp);
}

function getSel() {
  if (!dragStart || !dragEnd) return null;
  return {
    r1: Math.min(dragStart.r, dragEnd.r), c1: Math.min(dragStart.c, dragEnd.c),
    r2: Math.max(dragStart.r, dragEnd.r), c2: Math.max(dragStart.c, dragEnd.c),
  };
}

function renderBoard() {
  const sel = getSel();
  const check = sel ? checkSelection(sel.r1, sel.c1, sel.r2, sel.c2) : null;
  const sc = getScores();

  document.getElementById('score-first').textContent  = sc.first;
  document.getElementById('score-second').textContent = sc.second;
  document.getElementById('card-first').classList.toggle('active', currentPlayer === 'first' && !finished);
  document.getElementById('card-second').classList.toggle('active', currentPlayer === 'second' && !finished);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = board[r][c];
      const el = document.getElementById(`c-${r}-${c}`);
      const num  = el.querySelector('.cell-num');

      let cls = 'cell';
      if (v === -1) {
        cls += ' owned-first';
        num.textContent = '';
      } else if (v === -2) {
        cls += ' owned-second';
        num.textContent = '';
      } else {
        num.textContent = v;
        if (showHints && hintSet && hintSet.has(r * COLS + c)) cls += ' hint';
      }

      if (sel && r >= sel.r1 && r <= sel.r2 && c >= sel.c1 && c <= sel.c2)
        cls += ` sel s-${check.reason}`;

      el.className = cls;
    }
  }
  updateStatus(sel, check);
}

function updateStatus(sel, check) {
  const bar = document.getElementById('statusBar');
  if (finished) {
    bar.innerHTML = '<span style="color:#81c784;font-weight:600">게임 종료</span>';
    return;
  }
  if (!sel) {
    const name  = currentPlayer === 'first' ? '선공' : '후공';
    const color = currentPlayer === 'first' ? '#87ceeb' : '#ce93d8';
    bar.innerHTML = `<span style="color:${color};font-weight:600">${name}의 차례</span>` +
                    `<span style="color:#555"> — 드래그로 합이 10인 직사각형 선택</span>`;
    return;
  }
  if (check.valid)
    bar.innerHTML = `<span style="color:#4caf50;font-weight:700">✓ 합: ${check.sum} — 유효! 마우스를 놓으면 확정</span>`;
  else if (check.reason === 'low')
    bar.innerHTML = `<span style="color:#ffc107">합: ${check.sum} / 10 (더 넓게 선택)</span>`;
  else if (check.reason === 'over')
    bar.innerHTML = `<span style="color:#f44336">합: ${check.sum} — 너무 큼 (10이어야 함)</span>`;
  else
    bar.innerHTML = `<span style="color:#ff9800">합: ${check.sum} — 경계에 양수 셀이 없음</span>`;
}

// ── Mouse events ─────────────────────────────────────────
function onCellDown(e) {
  if (finished) return;
  e.preventDefault();
  dragStart = { r: +e.currentTarget.dataset.r, c: +e.currentTarget.dataset.c };
  dragEnd   = { ...dragStart };
  isDragging = true;
  renderBoard();
}
function onCellEnter(e) {
  if (!isDragging) return;
  dragEnd = { r: +e.currentTarget.dataset.r, c: +e.currentTarget.dataset.c };
  renderBoard();
}
function onDocMouseUp() {
  if (!isDragging) return;
  isDragging = false;
  const sel = getSel();
  if (sel) {
    const { valid } = checkSelection(sel.r1, sel.c1, sel.r2, sel.c2);
    if (valid) {
      doMove(sel.r1, sel.c1, sel.r2, sel.c2);
      if (showHints) hintSet = computeHintSet();
    }
  }
  dragStart = dragEnd = null;
  renderBoard();
}

// ── Log panel ────────────────────────────────────────────
function pushLog(line) {
  const box   = document.getElementById('logBox');
  const idx   = box.children.length + 1;
  const parts = line.trim().split(/\s+/);
  const cmd   = parts[0];
  const isMove = cmd === 'FIRST' || cmd === 'SECOND';
  const color = LOG_COLOR[cmd] || '#dedfe0';

  const row = document.createElement('div');
  row.className = 'log-entry';

  const no = document.createElement('div');
  no.className = 'log-no';
  no.textContent = idx;

  const sep = document.createElement('div');
  sep.className = 'log-sep';
  sep.textContent = '│';

  const text = document.createElement('div');
  text.className = 'log-text';

  const s0 = document.createElement('span');
  s0.style.color = color;
  s0.textContent = cmd;
  text.appendChild(s0);

  parts.slice(1).forEach((p, i) => {
    const s = document.createElement('span');
    if (isMove && i === parts.length - 2) s.style.color = '#555';
    s.textContent = ' ' + p;
    text.appendChild(s);
  });

  row.appendChild(no);
  row.appendChild(sep);
  row.appendChild(text);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

// ── Controls ─────────────────────────────────────────────
document.getElementById('btnHint').addEventListener('click', () => {
  showHints = !showHints;
  const btn = document.getElementById('btnHint');
  btn.textContent = showHints ? '힌트 끄기' : '힌트 켜기';
  btn.classList.toggle('active-toggle', showHints);
  if (showHints && !hintSet) hintSet = computeHintSet();
  renderBoard();
});
document.getElementById('btnSkip').addEventListener('click', () => {
  if (finished) return;
  dragStart = dragEnd = null;
  doSkip();
  if (showHints) hintSet = computeHintSet();
  renderBoard();
});
document.getElementById('btnNew').addEventListener('click', initGame);

// ── Touch support ────────────────────────────────────────
(function setupTouch() {
  function cellAt(x, y) {
    const el = document.elementFromPoint(x, y);
    return el && el.dataset.r !== undefined ? el : (el && el.closest('.cell'));
  }
  document.getElementById('board').addEventListener('touchstart', e => {
    if (finished) return;
    e.preventDefault();
    const t = e.touches[0], cell = cellAt(t.clientX, t.clientY);
    if (!cell) return;
    dragStart = { r: +cell.dataset.r, c: +cell.dataset.c };
    dragEnd = { ...dragStart };
    isDragging = true;
    renderBoard();
  }, { passive: false });
  document.getElementById('board').addEventListener('touchmove', e => {
    if (!isDragging) return;
    e.preventDefault();
    const t = e.touches[0], cell = cellAt(t.clientX, t.clientY);
    if (!cell) return;
    dragEnd = { r: +cell.dataset.r, c: +cell.dataset.c };
    renderBoard();
  }, { passive: false });
  document.getElementById('board').addEventListener('touchend', e => {
    e.preventDefault();
    onDocMouseUp();
  }, { passive: false });
})();

// ── Init ─────────────────────────────────────────────────
function initGame() {
  board = randomBoard();
  currentPlayer = 'first';
  actionIndex = 0;
  consecutiveSkips = 0;
  finished = false;
  dragStart = dragEnd = null;
  isDragging = false;
  hintSet = null;
  showHints = false;
  document.getElementById('btnHint').textContent = '힌트 켜기';
  document.getElementById('btnHint').classList.remove('active-toggle');
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('resultBanner').classList.remove('show');
  const initStr = ['INIT', ...board.map(row => row.join(''))].join(' ');
  pushLog(initStr);
  buildBoardDOM();
  renderBoard();
}

initGame();
</script>
