<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chain Reaction — 로그 시각화</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #16213e; border-bottom: 1px solid #2a2a4a; padding: 14px 24px; display: flex; align-items: center; justify-content: center; }
    header h1 { font-size: 1.3rem; font-weight: 700; color: #87ceeb; }

    .upload-area {
      margin: 20px auto; width: 90%; max-width: 860px;
      background: #16213e; border-radius: 12px; padding: 16px;
      border: 2px dashed #2a2a4a;
    }
    .upload-area.drag-over { border-color: #87ceeb; }
    .upload-area textarea {
      width: 100%; height: 90px; background: #0d0d1a; border: none; border-radius: 8px;
      color: #ccc; font-family: monospace; font-size: 0.78rem; padding: 8px; resize: vertical;
    }
    .upload-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
    .upload-area input[type=file] { display: none; }
    button {
      padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.85rem; font-family: inherit; font-weight: 500;
      background: #0f3460; color: #ccc; transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #1a5276; color: #fff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .main { display: flex; gap: 16px; padding: 0 16px 24px; max-width: 1100px; margin: 0 auto; width: 100%; align-items: flex-start; }
    .game-col { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .score-row { display: flex; gap: 16px; width: 100%; justify-content: center; }
    .score-card {
      background: #16213e; border-radius: 10px; padding: 10px 20px; text-align: center;
      border: 2px solid #2a2a4a; min-width: 110px;
    }
    .score-card.p1 { border-color: #1565c0; }
    .score-card.p2 { border-color: #b71c1c; }
    .score-name { font-size: 0.82rem; font-weight: 600; }
    .score-card.p1 .score-name { color: #64b5f6; }
    .score-card.p2 .score-name { color: #e57373; }
    .score-val { font-size: 1.8rem; font-weight: 800; }
    .score-card.p1 .score-val { color: #64b5f6; }
    .score-card.p2 .score-val { color: #e57373; }

    .board-wrap { background: #0d0d1a; border-radius: 12px; padding: 10px; box-shadow: 0 6px 28px rgba(0,0,0,0.5); }
    .board { display: grid; grid-template-columns: repeat(6,68px); grid-template-rows: repeat(6,68px); gap: 3px; }
    .cell {
      width: 68px; height: 68px; border-radius: 8px; position: relative;
      display: flex; align-items: center; justify-content: center; background: #1e1e35;
      transition: background 0.2s;
    }
    .cell.p1 { background: #0d2a5e; }
    .cell.p2 { background: #5e0d0d; }
    .cell.highlight { outline: 3px solid #fff; outline-offset: -2px; }
    @keyframes pulsep1 { 0%,100%{box-shadow:0 0 6px rgba(100,181,246,0.4)} 50%{box-shadow:0 0 16px rgba(100,181,246,1)} }
    @keyframes pulsep2 { 0%,100%{box-shadow:0 0 6px rgba(229,115,115,0.4)} 50%{box-shadow:0 0 16px rgba(229,115,115,1)} }
    .cell.crit-p1 { animation: pulsep1 0.8s infinite; }
    .cell.crit-p2 { animation: pulsep2 0.8s infinite; }

    /* SVG orbs inside each cell */
    .cell svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    .ctrl-row { display: flex; gap: 8px; align-items: center; background: #16213e; border-radius: 10px; padding: 8px 12px; width: 100%; }
    .ctrl-row input[type=range] { flex: 1; }
    .turn-info { font-size: 0.82rem; color: #888; white-space: nowrap; }

    .status-bar { width: 100%; background: #111; border-radius: 8px; padding: 7px 14px; font-size: 0.82rem; min-height: 2.2rem; display: flex; align-items: center; }

    .log-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .log-header { background: #16213e; border-radius: 10px 10px 0 0; padding: 8px 14px; font-size: 0.88rem; font-weight: 700; color: #87ceeb; }
    .log-box { background: #1e1e2e; border-radius: 0 0 10px 10px; overflow-y: auto; max-height: calc(100vh - 200px); font-family: 'Consolas','Menlo',monospace; font-size: 0.78rem; }
    .log-entry { display: flex; align-items: baseline; cursor: pointer; }
    .log-entry:hover { background: #252535; }
    .log-entry.active { background: #1a3a5c; }
    .log-no  { flex: 0 0 3.6em; text-align: right; padding: 3px 8px; color: #555; }
    .log-sep { color: #444; padding: 3px 0; }
    .log-text { flex: 1; padding: 3px 10px; white-space: pre-wrap; color: #dedfe0; }
  </style>
</head>
<body>
<header><h1>⚛️ Chain Reaction — 로그 시각화</h1></header>

<div class="upload-area" id="uploadArea">
  <textarea id="logInput" placeholder="여기에 게임 로그를 붙여넣으세요...&#10;또는 로그 파일을 드래그앤드롭하세요."></textarea>
  <div class="upload-row">
    <button onclick="document.getElementById('fileInput').click()">파일 열기</button>
    <input type="file" id="fileInput" accept=".txt,.log">
    <button onclick="loadFromTextarea()">로그 불러오기</button>
    <span style="font-size:0.78rem;color:#556">INIT → FIRST/SECOND → WIN/LOSE 형식</span>
  </div>
</div>

<div class="main" id="mainArea" style="display:none">
  <div class="game-col">
    <div class="score-row">
      <div class="score-card p1"><div class="score-name">선공</div><div class="score-val" id="score1">0</div></div>
      <div class="score-card p2"><div class="score-name">후공</div><div class="score-val" id="score2">0</div></div>
    </div>
    <div class="board-wrap"><div class="board" id="board"></div></div>
    <div class="ctrl-row">
      <button id="btnPrev" onclick="gotoTurn(curTurn-1)">◀</button>
      <input type="range" id="slider" min="0" value="0" oninput="gotoTurn(+this.value)">
      <button id="btnNext" onclick="gotoTurn(curTurn+1)">▶</button>
      <button id="btnPlay" onclick="togglePlay()">▶ 재생</button>
      <span class="turn-info" id="turnInfo">0 / 0</span>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>
  <div class="log-col">
    <div class="log-header">게임 로그</div>
    <div class="log-box" id="logBox"></div>
  </div>
</div>

<script>
const NR=6, NC=6;
const ORB_POS = {
  1: [[34,34]],
  2: [[22,34],[46,34]],
  3: [[22,24],[46,24],[34,44]]
};
const C1='#64b5f6', C2='#e57373';

function cap(r,c){ return 4-(r==0||r==NR-1?1:0)-(c==0||c==NC-1?1:0); }

function processExplosions(board, pn){
  let changed=true, iter=0;
  while(changed && iter++<500){
    changed=false;
    for(let r=0;r<NR;r++) for(let c=0;c<NC;c++){
      if(board[r][c].n >= cap(r,c)){
        changed=true;
        board[r][c].n -= cap(r,c);
        if(board[r][c].n===0) board[r][c].p=0;
        [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
          let nr=r+dr,nc=c+dc;
          if(nr<0||nr>=NR||nc<0||nc>=NC) return;
          board[nr][nc].n++;
          board[nr][nc].p=pn;
        });
      }
    }
  }
}

function cloneBoard(b){ return b.map(row=>row.map(c=>({...c}))); }

function parseLog(text){
  const lines = text.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  const snapshots=[]; // {board, player, r, c, label}
  let board = Array.from({length:NR},()=>Array.from({length:NC},()=>({n:0,p:0})));

  for(const line of lines){
    const parts = line.split(/\s+/);
    if(parts[0]==='INIT'){
      for(let r=0;r<NR;r++){
        const row = parts[1+r] || '';
        for(let c=0;c<NC;c++){
          const ch=row[c]||'0';
          if(ch==='0'){ board[r][c]={n:0,p:0}; }
          else if(ch>='1'&&ch<='3'){ board[r][c]={n:ch-'0',p:1}; }
          else { board[r][c]={n:ch-'3',p:2}; }
        }
      }
      snapshots.push({board:cloneBoard(board), player:0, r:-1, c:-1, label:line});
    } else if(parts[0]==='FIRST'||parts[0]==='SECOND'){
      const pn=parts[0]==='FIRST'?1:2;
      const r=+parts[1], c=+parts[2];
      board[r][c].p=pn; board[r][c].n++;
      processExplosions(board, pn);
      snapshots.push({board:cloneBoard(board), player:pn, r, c, label:line});
    }
  }
  return snapshots;
}

let snapshots=[], curTurn=0, playTimer=null;

function countOrbs(board, pn){
  let n=0;
  for(let r=0;r<NR;r++) for(let c=0;c<NC;c++) if(board[r][c].p===pn) n+=board[r][c].n;
  return n;
}

function buildBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<NR;r++) for(let c=0;c<NC;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.id=`c-${r}-${c}`;
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 68 68');
    cell.appendChild(svg);
    el.appendChild(cell);
  }
}

function renderTurn(idx){
  if(!snapshots.length) return;
  idx=Math.max(0,Math.min(snapshots.length-1,idx));
  curTurn=idx;
  const snap=snapshots[idx];
  const board=snap.board;

  document.getElementById('score1').textContent=countOrbs(board,1);
  document.getElementById('score2').textContent=countOrbs(board,2);
  document.getElementById('slider').value=idx;
  document.getElementById('turnInfo').textContent=`${idx} / ${snapshots.length-1}`;

  for(let r=0;r<NR;r++) for(let c=0;c<NC;c++){
    const {n,p}=board[r][c];
    const el=document.getElementById(`c-${r}-${c}`);
    const isHL=(r===snap.r&&c===snap.c&&snap.player>0);
    const isCrit=(p>0&&n===cap(r,c)-1);

    let cls='cell';
    if(p===1) cls+=' p1'; else if(p===2) cls+=' p2';
    if(isHL) cls+=' highlight';
    else if(isCrit&&p===1) cls+=' crit-p1';
    else if(isCrit&&p===2) cls+=' crit-p2';
    el.className=cls;

    const svg=el.querySelector('svg');
    svg.innerHTML='';
    if(n>0&&n<=3){
      const color=p===1?C1:C2;
      (ORB_POS[n]||[]).forEach(([ox,oy])=>{
        const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
        circle.setAttribute('cx',ox); circle.setAttribute('cy',oy); circle.setAttribute('r',11);
        circle.setAttribute('fill',color);
        circle.setAttribute('filter',`drop-shadow(0 0 4px ${color})`);
        svg.appendChild(circle);
      });
    } else if(n>3){
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',34); txt.setAttribute('y',40);
      txt.setAttribute('text-anchor','middle'); txt.setAttribute('font-size',22);
      txt.setAttribute('font-weight','bold'); txt.setAttribute('fill',p===1?C1:C2);
      txt.textContent=n;
      svg.appendChild(txt);
    }
  }

  // 상태바
  const bar=document.getElementById('statusBar');
  if(snap.player>0){
    const color=snap.player===1?C1:C2;
    const name=snap.player===1?'선공':'후공';
    bar.innerHTML=`<span style="color:${color};font-weight:600">${name}</span><span style="color:#555"> — (${snap.r}, ${snap.c})에 구슬 배치</span>`;
  } else {
    bar.innerHTML='<span style="color:#888">초기 보드 상태</span>';
  }

  // 로그 패널 활성화
  document.querySelectorAll('.log-entry').forEach((el,i)=>
    el.classList.toggle('active', i===idx));
  const activeEl=document.querySelector('.log-entry.active');
  if(activeEl) activeEl.scrollIntoView({block:'nearest'});
}

function gotoTurn(t){ renderTurn(t); }

function togglePlay(){
  const btn=document.getElementById('btnPlay');
  if(playTimer){
    clearInterval(playTimer); playTimer=null;
    btn.textContent='▶ 재생';
  } else {
    btn.textContent='⏸ 정지';
    playTimer=setInterval(()=>{
      if(curTurn>=snapshots.length-1){ clearInterval(playTimer); playTimer=null; btn.textContent='▶ 재생'; return; }
      gotoTurn(curTurn+1);
    }, 800);
  }
}

function buildLogPanel(lines){
  const box=document.getElementById('logBox');
  box.innerHTML='';
  const COLORS={INIT:'#ffb74d',FIRST:'#64b5f6',SECOND:'#e57373',WIN:'#81c784',LOSE:'#81c784',NONE:'#ffd54f'};
  lines.forEach((line,i)=>{
    const row=document.createElement('div'); row.className='log-entry';
    row.onclick=()=>gotoTurn(i);
    const no=document.createElement('div'); no.className='log-no'; no.textContent=i+1;
    const sep=document.createElement('div'); sep.className='log-sep'; sep.textContent='│';
    const txt=document.createElement('div'); txt.className='log-text';
    const cmd=line.split(/\s+/)[0];
    const s=document.createElement('span'); s.style.color=COLORS[cmd]||'#dedfe0'; s.textContent=line;
    txt.appendChild(s);
    row.appendChild(no); row.appendChild(sep); row.appendChild(txt);
    box.appendChild(row);
  });
}

function loadLog(text){
  snapshots=parseLog(text);
  if(!snapshots.length){alert('로그 파싱 실패. INIT 줄이 있는지 확인하세요.'); return;}
  const slider=document.getElementById('slider');
  slider.max=snapshots.length-1; slider.value=0;
  buildBoard();
  buildLogPanel(text.trim().split('\n').map(l=>l.trim()).filter(Boolean));
  document.getElementById('mainArea').style.display='flex';
  document.getElementById('uploadArea').style.marginBottom='8px';
  renderTurn(0);
}

function loadFromTextarea(){
  loadLog(document.getElementById('logInput').value);
}

document.getElementById('fileInput').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>loadLog(ev.target.result);
  reader.readAsText(file);
});

const ua=document.getElementById('uploadArea');
ua.addEventListener('dragover',e=>{e.preventDefault();ua.classList.add('drag-over');});
ua.addEventListener('dragleave',()=>ua.classList.remove('drag-over'));
ua.addEventListener('drop',e=>{
  e.preventDefault(); ua.classList.remove('drag-over');
  const file=e.dataTransfer.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>loadLog(ev.target.result);
  reader.readAsText(file);
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') gotoTurn(curTurn-1);
  else if(e.key==='ArrowRight') gotoTurn(curTurn+1);
  else if(e.key===' '){ e.preventDefault(); togglePlay(); }
});

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='LOAD_LOG') loadLog(e.data.log);
});
</script>
</body>
</html>
